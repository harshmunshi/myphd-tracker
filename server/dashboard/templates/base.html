<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}myphd-tracker{% endblock %}</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5;
  }
  nav a { margin-right: 1rem; }
  h1, h2, h3 { line-height: 1.25; }
  .pill {
    display: inline-block; padding: 0.1rem 0.6rem; border-radius: 999px;
    font-size: 0.8rem; font-weight: 600; vertical-align: middle;
  }
  .pill.active, .pill.running, .pill.done { background: #d7f3dc; color: #16632b; }
  .pill.blocked, .pill.failed { background: #fbdada; color: #9c1c1c; }
  .pill.planned, .pill.paused { background: #ffecd1; color: #9a5a00; }
  .pill.abandoned { background: #e5e5e5; color: #555; }
  .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .muted { color: #777; font-size: 0.9rem; }
  code, pre { background: #f5f5f5; border-radius: 4px; }
  table { border-collapse: collapse; margin: 1rem 0; }
  th, td { border: 1px solid #ddd; padding: 0.3rem 0.6rem; text-align: left; }
  details summary { cursor: pointer; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #eee; }
    .card { border-color: #444; }
    code, pre { background: #262626; }
    th, td { border-color: #444; }
    .muted { color: #999; }
    a { color: #7ab4ff; }
  }
</style>
</head>
<body>
<nav>
  <a href="{{ root_prefix }}index.html">Overview</a>
  <a href="{{ root_prefix }}bibliography.html">Bibliography</a>
</nav>
<hr>
{% block content %}{% endblock %}
</body>
</html>
